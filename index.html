<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف طارق وعبير</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d4af37;
            --bg-color: #fffaf0;
            --text-color: #333;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            overflow-x: hidden;
        }
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(255, 250, 240, 0.8), rgba(255, 250, 240, 0.8)), url('https://images.unsplash.com/photo-1519741497674-611481863552?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
        }
        .invitation-card {
            border: 2px solid var(--primary-color);
            padding: 50px;
            margin: 20px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            position: relative;
        }
        h1 {
            font-family: 'Amiri', serif;
            font-size: 3.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .date {
            font-size: 1.5rem;
            margin: 20px 0;
            font-weight: bold;
        }
        .location {
            font-size: 1.2rem;
            color: #666;
        }
        .message {
            font-size: 1.3rem;
            margin: 30px 0;
            line-height: 1.8;
        }
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        .countdown-item {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            border-radius: 8px;
            min-width: 80px;
        }
        .countdown-item span {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
        }
        footer {
            padding: 50px 20px;
            background: #f8f8f8;
            border-top: 1px solid #ddd;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #b8962d;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <header>
        <div class="invitation-card">
            <p style="font-size: 1.2rem;">نتشرف بدعوتكم لحضور حفل زفاف</p>
            <h1>طارق & عبير</h1>
            <p class="message">بقلوب ملؤها المحبة، يسعدنا أن تشاركونا فرحتنا في ليلة العمر.</p>
            <div class="date">الجمعة، 8 مايو 2026</div>
            <div class="time">الساعة 08:00 مساءً</div>
            <div class="location">سيتم تحديد المكان لاحقاً</div>
            
            <div class="countdown" id="countdown">
                <div class="countdown-item"><span id="days">00</span>أيام</div>
                <div class="countdown-item"><span id="hours">00</span>ساعة</div>
                <div class="countdown-item"><span id="minutes">00</span>دقيقة</div>
                <div class="countdown-item"><span id="seconds">00</span>ثانية</div>
            </div>
            
            <a href="#" class="btn">تأكيد الحضور (RSVP)</a>
        </div>
    </header>

    <footer>
        <p>ننتظركم بكل حب وفرح</p>
        <p>&copy; 2026 طارق وعبير</p>
    </footer>

    <script>
        const weddingDate = new Date("May 8, 2026 20:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days;
            document.getElementById("hours").innerHTML = hours;
            document.getElementById("minutes").innerHTML = minutes;
            document.getElementById("seconds").innerHTML = seconds;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "لقد بدأ الحفل!";
            }
        }, 1000);
    </script>
</body>
</html>
